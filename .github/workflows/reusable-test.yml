name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      upload-coverage:
        type: boolean
        default: false
      python-versions:
        type: string
        default: '["3.10","3.11","3.12"]'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend artifacts
        run: npm run build

      - name: Archive frontend build outputs
        run: tar -czf frontend-build.tar.gz dist jsonschema_diagram/data

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-build.tar.gz

  tests:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Restore frontend build outputs
        run: tar -xzf frontend-build.tar.gz

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Install dev dependencies
        run: make install-dev

      - name: Run tests with coverage
        if: ${{ matrix.python-version == '3.12' && inputs.upload-coverage }}
        run: |
          python -m coverage run -m unittest discover -s tests -v
          python -m coverage xml
          python -m coverage html
          python -m coverage report

      - name: Run tests
        if: ${{ matrix.python-version != '3.12' || !inputs.upload-coverage }}
        run: make test

      - name: Upload coverage artifacts
        if: ${{ matrix.python-version == '3.12' && inputs.upload-coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml

  docs:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Restore frontend build outputs
        run: tar -xzf frontend-build.tar.gz

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Install dev dependencies
        run: make install-dev

      - name: Build documentation
        run: make docs

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Install dev dependencies
        run: make install-dev

      - name: Run flake8
        run: make lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Install dev dependencies
        run: make install-dev

      - name: Run mypy
        run: make type-check

  package-build:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Restore frontend build outputs
        run: tar -xzf frontend-build.tar.gz

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Install dev dependencies
        run: make install-dev

      - name: Build package
        run: make build-package

      - name: Check built distributions
        run: python -m twine check dist/*.tar.gz dist/*.whl
