name: Release Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      action:
        description: Choose what to execute
        required: true
        default: all
        type: choice
        options:
          - all
          - pypi-publish
          - docs-build-publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    if: ${{ github.event_name == 'release' || github.event.inputs.action == 'all' || github.event.inputs.action == 'pypi-publish' || github.event.inputs.action == 'docs-build-publish' }}
    uses: ./.github/workflows/reusable-test.yml
    with:
      upload-coverage: true

  build-and-deploy-docs:
    if: ${{ github.event_name == 'release' || github.event.inputs.action == 'all' || github.event.inputs.action == 'docs-build-publish' }}
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Install dev dependencies
        run: make install-dev

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Documentation
        uses: ./.github/actions/build-docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    if: ${{ github.event_name == 'release' || github.event.inputs.action == 'all' || github.event.inputs.action == 'pypi-publish' }}
    runs-on: ubuntu-latest
    needs: test
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: Install dev dependencies
        run: make install-dev

      - name: Build frontend artifacts
        run: npm run build

      - name: Build package
        run: make build-package

      - name: Check package
        run: python -m twine check python-dist/*.tar.gz python-dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist/
          verify-metadata: false
